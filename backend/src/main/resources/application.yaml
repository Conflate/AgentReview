spring:
  application:
    name: agentreview-backend
  datasource:
    url: jdbc:postgresql://localhost:55432/agentreview
    username: agentreview
    password: agentreview
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

agentreview:
  ai:
    provider: fake
