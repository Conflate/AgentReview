services:
  postgres:
    image: postgres:16
    container_name: agentreview-postgres
    environment:
      POSTGRES_DB: agentreview
      POSTGRES_USER: agentreview
      POSTGRES_PASSWORD: agentreview
    ports:
      - "55432:5432"
    volumes:
      - agentreview_postgres_data:/var/lib/postgresql/data

volumes:
  agentreview_postgres_data:
